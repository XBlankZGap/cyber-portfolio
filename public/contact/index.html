    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

<script defer src="/cyber-portfolio/js/fuse.basic.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    let searchInput = document.getElementById("inline-search-input");
    let searchResults = document.getElementById("inline-search-results");
    let fuse;
    
    if(!searchInput) return;

    fetch("\/cyber-portfolio\/index.json")
        .then(res => res.json())
        .then(data => {
            let options = {
                keys: ["title", "content", "summary", "tags"],
                ignoreLocation: true,
                threshold: 0.3,
                minMatchCharLength: 2
            };
            fuse = new Fuse(data, options);
        })
        .catch(err => console.error("Search index failed to load", err));

    searchInput.addEventListener("input", function() {
        if (!fuse) return;
        let query = this.value;
        if (query.trim().length === 0) {
            searchResults.style.display = "none";
            searchResults.innerHTML = "";
            return;
        }
        
        let results = fuse.search(query);
        if (results.length > 0) {
            let html = "";
            results.slice(0, 8).forEach(res => {
                html += `<li><a href="${res.item.permalink}">${res.item.title}</a></li>`;
            });
            searchResults.innerHTML = html;
            searchResults.style.display = "block";
        } else {
            searchResults.innerHTML = "<li class='no-results'>No results found</li>";
            searchResults.style.display = "block";
        }
    });

    document.addEventListener("click", function(event) {
        if (!searchInput) return;
        if (!searchInput.contains(event.target) && !searchResults.contains(event.target)) {
            searchResults.style.display = "none";
        }
    });
});
</script>
